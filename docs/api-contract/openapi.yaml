openapi: 3.0.3
info:
  title: GoalPilot API
  version: 1.0.0
paths:
  /transactions:
    post:
      summary: Manual transaction entry
      responses:
        '201':
          description: Created
  /receipts/ocr:
    post:
      summary: Receipt ingestion placeholder
      responses:
        '202':
          description: Accepted for processing
  /user/context:
    get:
      summary: Retrieve dual-context user state
      responses:
        '200':
          description: OK
  /agent/evaluate:
    post:
      summary: Evaluate financial state against strategies
      responses:
        '200':
          description: Evaluation complete
  /agent/intervene:
    post:
      summary: Agentic intervention or suggestion based on evaluate output
      responses:
        '200':
          description: Intervention proposed
  /market/prediction:
    get:
      summary: Get external market context and forecasts
      parameters:
        - in: query
          name: Present_Price
          required: true
          schema:
            type: number
        - in: query
          name: Kms_Driven
          required: true
          schema:
            type: number
        - in: query
          name: Fuel_Type
          required: true
          schema:
            type: string
            enum: [Petrol, Diesel, CNG]
        - in: query
          name: Seller_Type
          required: true
          schema:
            type: string
            enum: [Dealer, Individual]
        - in: query
          name: Transmission
          required: true
          schema:
            type: string
            enum: [Manual, Automatic]
        - in: query
          name: Owner
          required: true
          schema:
            type: integer
        - in: query
          name: Year
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
    post:
      summary: Predict used-car price from SageMaker XGBoost endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - Present_Price
                - Kms_Driven
                - Fuel_Type
                - Seller_Type
                - Transmission
                - Owner
                - Year
              properties:
                Present_Price:
                  type: number
                Kms_Driven:
                  type: number
                Fuel_Type:
                  type: string
                  enum: [Petrol, Diesel, CNG]
                Seller_Type:
                  type: string
                  enum: [Dealer, Individual]
                Transmission:
                  type: string
                  enum: [Manual, Automatic]
                Owner:
                  type: integer
                Year:
                  type: integer
      responses:
        '200':
          description: Prediction completed
