openapi: 3.0.3
info:
  title: GoalPilot API
  version: 1.0.0
paths:
  /transactions:
    post:
      summary: Manual transaction entry
      responses:
        '201':
          description: Created
  /receipts/ocr:
    post:
      summary: Receipt ingestion placeholder
      responses:
        '202':
          description: Accepted for processing
  /user/context:
    get:
      summary: Retrieve dual-context user state
      responses:
        '200':
          description: OK
  /agent/evaluate:
    post:
      summary: Evaluate financial state against strategies
      responses:
        '200':
          description: Evaluation complete
  /agent/intervene:
    post:
      summary: Agentic intervention or suggestion based on evaluate output
      responses:
        '200':
          description: Intervention proposed
  /market/prediction:
    get:
      summary: Get external market context and forecasts
      responses:
        '200':
          description: OK
